name: CBK foreign trade summary scraper

on:
  schedule:
    # 06:00 UTC on the 20th of each month — CBK typically publishes the prior month's trade
    # summary partway through the following month. Adjust if CBK's actual publication cadence
    # is known to differ.
    - cron: "0 6 20 * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run against
        type: choice
        options:
          - production
          - preview
        default: production

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: apps/scrapers
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - run: uv sync

      - run: uv run python -m src.cbk_foreign_trade.main --upload --dataset-slug cbk-foreign-trade
        env:
          AESOPS_API_URL: ${{ secrets.AESOPS_API_URL }}
          AESOPS_API_KEY: ${{ secrets.AESOPS_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
